name: Deploy Rails App

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and Deploy to Staging
        run: |
          make build-staging PROJECT_NAME=my_app_staging
          cd my_app_staging
          # Aqui você pode adicionar comandos específicos para staging
          # como deploy para servidor, testes, etc.
        env:
          RAILS_PORT: 3000
          DB_PORT: 5433
          POSTGRES_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          POSTGRES_USER: ${{ secrets.STAGING_DB_USER }}
          POSTGRES_DB: ${{ secrets.STAGING_DB_NAME }}
          DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          SECRET_KEY_BASE: ${{ secrets.STAGING_SECRET_KEY_BASE }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and Deploy to Production
        run: |
          make build-prod PROJECT_NAME=my_app_production
          cd my_app_production
          # Aqui você pode adicionar comandos específicos para produção
          # como deploy para servidor, testes, etc.
        env:
          RAILS_PORT: 3000
          DB_PORT: 5433
          POSTGRES_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          POSTGRES_USER: ${{ secrets.PROD_DB_USER }}
          POSTGRES_DB: ${{ secrets.PROD_DB_NAME }}
          DB_HOST: ${{ secrets.PROD_DB_HOST }}
          SECRET_KEY_BASE: ${{ secrets.PROD_SECRET_KEY_BASE }}
